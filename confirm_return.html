{% extends "index.html" %}
{% block content %}
<div style="padding: 20px;  background: rgba(255,255,255,0.9); border-radius: 10px; max-width: 500px; margin: 50px auto;margin-top: 200px;">
    <center>
        <h2>Confirm Return</h2>
    </center>
    <form action="/process_return" method="POST" id="confirm_return">
        <p><strong>Book Title:</strong> {{ item[0] }}</p>
        <p><strong>Student Name:</strong> {{ item[1] }}</p>
        <p><strong>Issued Quantity:</strong> {{ item[3] }}</p>
        
        <input type="hidden" name="title" value="{{ item[0] }}">
        <input type="hidden" name="student" value="{{ item[1] }}">
        <input type="hidden" name="trade" value="{{ item[2] }}">
        
        <label><strong>Copies to return:</strong></label>
        <input type="number" name="return_qty" value="{{ item[3] }}" max="{{ item[3] }}" min="1" required>
        <br><br>
        
        <button type="submit" style="background-color: green; color: white;">Confirm Return</button>
        <a href="/view_issued"><button type="button">Cancel</button></a>
    </form>
</div>
{% endblock %}
